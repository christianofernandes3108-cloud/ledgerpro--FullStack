<!DOCTYPE html>
<html>
<head>
  <title>LedgerPro Dashboard</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <div class="container">

    <!-- Header -->
    <div class="topbar">
  <div class="topbar-left">
    <h1 id="welcomeMessage">Welcome</h1>
  </div>

  <div class="topbar-right">
    <button onclick="toggleTheme()" class="btn-primary">
      Toggle Theme
    </button>
    
    <button class="btn-danger" onclick="logout()">Logout</button>
  </div>
</div>

    <!-- Monthly Summary -->
   <div class="card">
  <h2>Monthly Overview</h2>

  <label>Select Month</label>
  <input type="month" id="selectedMonth">

  <div class="grid" style="margin-top:20px;">
    <div class="card">
      <h3>Total Income</h3>
      <h2 id="totalIncome" class="positive">R0</h2>
    </div>

    <div class="card">
      <h3>Total Expenses</h3>
      <h2 id="totalExpenses" class="negative">R0</h2>
    </div>

    <div class="card">
      <h3>Net Balance</h3>
      <h2 id="netBalance">R0</h2>
    </div>
  </div>

  <h3 style="margin-top:25px;">Expense Breakdown</h3>
  <div id="categoryBreakdown"></div>
</div>

    <!-- CATEGORY MANAGEMENT -->
    <div class="card">
      <h2>Manage Categories</h2>

      <label>Category Name</label>
      <input type="text" id="newCategoryName" placeholder="e.g. Salary, Transport">

      <label>Category Type</label>
      <select id="newCategoryType">
        <option value="income">Income</option>
        <option value="expense">Expense</option>
      </select>

      <button class="btn-primary" onclick="addCategory()">Add Category</button>

      <h3 style="margin-top:20px;">Your Categories</h3>

      <div id="categoryList"></div>
    </div>

    <!-- Add Transaction -->
    <div class="card">
      <h2>Add Transaction</h2>

      <label>Type</label>
      <select id="type">
        <option value="income">Income</option>
        <option value="expense">Expense</option>
      </select>

      <label>Amount</label>
      <input type="number" id="amount" placeholder="Enter amount">

      <label>Category</label>
      <select id="category"></select>

      <label>Date</label>
      <input type="date" id="date">

      <label>Description</label>
      <input type="text" id="description" placeholder="Optional description">

      <button class="btn-primary" onclick="addTransaction()">Add Transaction</button>
    </div>

    <!-- Transactions -->
    <div class="card">
      <h2>Transactions</h2>

      <table>
        <thead>
          <tr>
            <th>Date</th>
            <th>Type</th>
            <th>Category</th>
            <th>Amount</th>
            <th>Description</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="transactionTable"></tbody>
      </table>
    </div>

  </div>

  <div class="card">
  <h2>Running Balance</h2>
  <div id="runningBalanceList"></div>
</div>

  <script src="js/api.js"></script>
  <script src="js/dashboard.js"></script>

  <button id="fab" onclick="scrollToTransaction()" class="fab">
  +
</button>
</body>
</html>
