<!DOCTYPE html>
<html>
<head>
  <title>Login - LedgerPro</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <div class="auth-container">

    <div class="auth-left">
      <h1>LedgerPro</h1>
      <p class="tagline">
        Simple. Professional. No gimmicks.
      </p>
      <p class="description">
        LedgerPro is a personal finance and expense tracking application
        designed to help you manage income, monitor spending,
        and understand your financial position with structured reporting.
      </p>
    </div>

    <div class="auth-right">
      <div class="card fade-in">
        <h2>Login to Your Account</h2>

        <label>Email</label>
        <input type="email" id="email" placeholder="Enter your email">

        <label>Password</label>
        <input type="password" id="password" placeholder="Enter your password">

        <button id="loginBtn" class="btn-primary" onclick="login()">
          Login
        </button>

        <p style="margin-top:15px;">
          Don’t have an account?
          <a href="register.html">Register</a>
        </p>
      </div>
    </div>

  </div>

  <script src="js/auth.js"></script>
</body>
</html>
