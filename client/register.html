<!DOCTYPE html>
<html>
<head>
  <title>Register - LedgerPro</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <div class="auth-container">

    <div class="auth-left">
      <h1>LedgerPro</h1>
      <p class="tagline">
        Simple. Professional. No gimmicks.
      </p>
      <p class="description">
        Take control of your finances with structured reporting,
        secure authentication, and precise transaction tracking.
      </p>
    </div>

    <div class="auth-right">
      <div class="card fade-in">
        <h2>Create Your Account</h2>

        <label>Name</label>
        <input type="text" id="name" placeholder="Enter your name">

        <label>Email</label>
        <input type="email" id="email" placeholder="Enter your email">

        <label>Password</label>
        <input type="password" id="password" placeholder="Create a password">

        <button id="registerBtn" class="btn-primary" onclick="register()">
          Register
        </button>

        <p style="margin-top:15px;">
          Already have an account?
          <a href="login.html">Login</a>
        </p>
      </div>
    </div>

  </div>

  <script src="js/auth.js"></script>
</body>
</html>
